on:
  push:
    branches: [main]
  workflow_dispatch:

name: Render and Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libharfbuzz-dev libfribidi-dev

      - name: Set up R dependencies cache
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ hashFiles('DESCRIPTION') }}-${{ hashFiles('.github/r-packages.txt') }}
          restore-keys: r-

      - name: Install R packages
        run: |
          install.packages(c(
            "knitr", "rmarkdown", "dplyr", "ggplot2", "readr",
            "haven", "caret", "glmnet", "rpart", "rpart.plot",
            "MASS", "pROC", "randomForest", "cluster", "mclust",
            "poLCA", "factoextra", "forecast", "tseries",
            "demography", "StMoMo", "HMDHFDplus",
            "tidyr", "tibble", "scales"
          ), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto Book
        uses: quarto-dev/quarto-actions/render@v2

      - name: Deploy to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
